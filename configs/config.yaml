dataset:
  data_dir: "./data"
  image_size: 224
  num_classes: 9

training:
  seed: 42
  batch_size: 64        # larger batch works well with B200
  num_workers: 4
  num_epochs: 10
  learning_rate: 0.001
  weight_decay: 0.0001
  patience: 7           # early stopping patience

output:
  results_dir: "./results"
  model_dir: "./results/models"
